<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Fishtagged — tag map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- MapLibre reads the same vector tiles Mapbox does, but needs no token, so the
     page works straight off GitHub Pages. Fish data is our own .pbf tileset in
     /tiles, built by build_tiles.py. -->
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<style>
  /* Matches the fishtagged.org look: white, sage green, navy text, clean sans.
     Brand green is used for the chrome + calls-to-action; the rust accent is
     kept for the DATA (retagged fish + journey lines) so it reads on the map.
     Filter menus stay grey, per Mr. Bailey. */
  :root{
    --ink:#20292b;            /* navy-black, like their wordmark */
    --label:#69736f;
    --hair:#e3e6e1;
    --paper:#ffffff;
    --field:#f3f6f2;
    --green:#6f8c78;          /* brand sage */
    --green-dk:#5a7765;
    --rust:#b4622d;           /* data accent: retagged + journeys */
    --rust-dk:#8f4a1f;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{ font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; color:var(--ink); background:var(--paper); }
  h1,h2,h3{ font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; font-weight:700; letter-spacing:-.01em; }
  .num{ font-variant-numeric:tabular-nums; }
  .cap{ font-size:10px; letter-spacing:.09em; text-transform:uppercase; color:var(--label); font-weight:bold; }

  /* ---- landing ---- */
  #gate{ position:fixed; inset:0; background:var(--paper); overflow:auto; z-index:40; }
  .brandbar{ display:flex; align-items:center; gap:12px; padding:15px clamp(16px,5vw,46px); border-bottom:1px solid var(--hair); }
  .logo{ display:flex; align-items:center; gap:9px; font-weight:800; font-size:17px; letter-spacing:.03em; }
  .logo svg{ width:24px; height:24px; flex:none; }
  .navlinks{ margin-left:auto; display:flex; align-items:center; gap:24px; font-size:14px; }
  .navlinks a{ color:var(--ink); text-decoration:none; }
  .navlinks a:hover{ color:var(--green-dk); }
  .cta{ background:var(--green); color:#fff !important; padding:9px 16px; border-radius:6px; }
  .cta:hover{ background:var(--green-dk); }
  #gate .col{ width:min(900px,90vw); margin:0 auto; padding:5vh 0 7vh; }
  .hero{ background:var(--field); border:1px solid var(--hair); border-radius:16px; padding:48px 40px; text-align:center; }
  #gate h1{ font-size:clamp(28px,4.6vw,46px); margin:0 0 12px; line-height:1.06; }
  #gate h1 i{ color:var(--green); font-style:normal; }
  .hero .lead{ font-size:17px; line-height:1.55; max-width:560px; margin:0 auto; color:#3a4145; }
  .sub{ display:flex; justify-content:center; gap:18px; font-size:13px; color:var(--label); margin-top:16px; }
  .levels{ margin-top:34px; border-top:1px solid var(--hair); }
  .lvl{ display:flex; gap:18px; align-items:center; padding:18px 6px; border-bottom:1px solid var(--hair);
        cursor:pointer; background:none; border-left:0; border-right:0; border-top:0; width:100%; text-align:left;
        font-family:inherit; color:inherit; }
  .lvl:hover{ background:var(--field); }
  .lvl .n{ font-size:22px; font-weight:800; color:var(--green); width:30px; flex:none; }
  .lvl h3{ font-size:19px; margin:0 0 3px; }
  .lvl p{ margin:0; font-size:13.5px; color:#52595d; line-height:1.45; max-width:560px; }
  .lvl .who{ margin-left:auto; flex:none; font-size:11px; color:var(--label); border:1px solid var(--hair);
             padding:4px 11px; border-radius:20px; white-space:nowrap; }

  button.flat{ height:38px; border:1px solid var(--hair); background:#fff; color:var(--ink); font-family:inherit;
               font-size:13px; cursor:pointer; padding:0 14px; }
  button.flat:hover{ border-color:var(--ink); }

  /* ---- app shell ---- */
  #app{ position:fixed; inset:0; display:none; }
  #app.on{ display:block; }
  #map{ position:absolute; inset:0; background:#dfe4e2; }

  .bar{ position:absolute; top:0; left:0; right:0; height:46px; background:#fff; border-bottom:1px solid var(--hair);
        display:flex; align-items:center; gap:12px; padding:0 14px; z-index:6; }
  .bar .name{ font-weight:800; font-size:16px; letter-spacing:.03em; display:flex; align-items:center; gap:7px; }
  .bar .name svg{ width:20px; height:20px; }
  .bar .lvlname{ font-size:11.5px; color:var(--label); padding-left:12px; border-left:1px solid var(--hair); }
  .bar .fill{ flex:1; }

  /* the left controls — one box with a light border, filters grouped inside */
  .pane{ position:absolute; top:60px; left:14px; width:320px; background:#fff; border:1px solid var(--hair);
         z-index:5; max-height:calc(100% - 74px); overflow:auto; }
  .blk{ border-top:1px solid var(--hair); padding:14px 16px; }
  .blk:first-child{ border-top:0; }

  .seek{ display:flex; gap:7px; }
  .seek input{ flex:1; height:40px; border:1px solid var(--hair); padding:0 11px; font-family:Verdana,sans-serif;
               font-size:15px; }
  .seek input:focus{ outline:none; border-color:var(--ink); }
  .seek button{ height:40px; padding:0 15px; border:1px solid var(--green); background:var(--green); color:#fff;
                font-family:inherit; font-size:13px; cursor:pointer; border-radius:6px; }
  .seek button:hover{ background:var(--green-dk); border-color:var(--green-dk); }
  .tries{ font-size:12px; color:var(--label); margin-top:8px; }
  .tries a{ color:var(--rust-dk); cursor:pointer; text-decoration:underline; }
  .said{ display:none; margin-top:9px; font-size:12.5px; padding:8px 10px; line-height:1.4; }
  .said.on{ display:block; }
  .said.good{ background:var(--field); border:1px solid var(--hair); }
  .said.bad{ background:#f7e9e6; color:#9a3318; }

  .seg{ display:flex; border:1px solid var(--hair); }
  .seg button{ flex:1; border:0; border-left:1px solid var(--hair); background:#fff; padding:8px 0; cursor:pointer;
               font-family:inherit; font-size:12.5px; color:var(--label); }
  .seg button:first-child{ border-left:0; }
  .seg button.on{ background:var(--ink); color:#fff; }

  .pick{ display:flex; flex-wrap:wrap; gap:6px; }
  .pick span{ font-size:12px; padding:6px 10px; border:1px solid var(--hair); cursor:pointer; color:#3f474b; }
  .pick span:hover{ border-color:var(--ink); }
  .pick span.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .pick span.fixed{ background:var(--field); cursor:default; color:var(--label); }

  .rows{ display:flex; flex-direction:column; }
  .rows button{ display:flex; justify-content:space-between; align-items:center; border:1px solid var(--hair);
                border-bottom:0; background:#fff; padding:9px 11px; cursor:pointer; font-family:inherit;
                font-size:13px; color:#3f474b; }
  .rows button:last-child{ border-bottom:1px solid var(--hair); }
  .rows button.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .rows button.off{ color:#a9ada8; background:var(--field); cursor:not-allowed; }
  .rows .tagm{ font-size:10px; color:var(--label); }
  .rows button.on .tagm{ color:#c9cdc7; }

  .nums{ display:grid; grid-template-columns:1fr 1fr; gap:11px 16px; }
  .nums .one .v{ font-family:Verdana,sans-serif; font-size:22px; font-weight:bold; }
  .nums .one .k{ font-size:10.5px; color:var(--label); margin-top:2px; }

  .ingest{ font-size:11.5px; color:#52595d; line-height:1.6; }
  .ingest b{ color:#1a7a4e; }
  .ingest code{ font-family:Consolas,Menlo,monospace; background:var(--field); padding:1px 4px; }

  /* legend now lives inside the left panel so it never collides with the map corner */
  .legend .lt{ font-size:12.5px; font-weight:bold; }
  .legend .ls{ font-size:11px; color:var(--label); margin:1px 0 8px; }
  .ramp{ height:10px; }
  .ramp.temp{ background:linear-gradient(90deg,#2c6fb0,#83b9d6,#eeeedc,#e0a558,#c0402c); }
  .ramp.seq{ background:linear-gradient(90deg,#eef2ee,#a9c6ab,#5a9469,#2f6a45); }
  .scale{ display:flex; justify-content:space-between; font-size:10px; color:var(--label); margin-top:4px; }
  .legend .ret{ display:flex; align-items:center; gap:7px; font-size:11px; color:#3f474b; margin-top:9px;
                padding-top:8px; border-top:1px solid var(--hair); }
  .dot-ret{ width:12px; height:12px; border-radius:50%; background:#c9cdc7; border:2.5px solid var(--rust); }

  /* the companion chart, top-right — a map alone isn't enough (guide p13) */
  .side{ position:absolute; top:60px; right:14px; width:250px; background:#fff; border:1px solid var(--hair);
         padding:13px 15px; z-index:5; }
  .side h3{ font-size:14px; margin:0; }
  .side .ssub{ font-size:11px; color:var(--label); margin:2px 0 11px; }
  .b-row{ margin-bottom:8px; }
  .b-row .bl{ display:flex; justify-content:space-between; font-size:11.5px; margin-bottom:3px; }
  .b-row .bl .nm{ color:#3f474b; }
  .b-row .bl .vl{ color:var(--label); font-family:Verdana,sans-serif; }
  .b-track{ height:9px; background:var(--field); }
  .b-fill{ height:9px; background:var(--rust); }

  .veil{ position:absolute; inset:0; background:var(--paper); z-index:8; display:flex; align-items:center;
         justify-content:center; flex-direction:column; gap:12px; }
  .veil.off{ display:none; }
  .sp{ width:26px; height:26px; border:3px solid var(--hair); border-top-color:var(--ink); border-radius:50%;
       animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .veil span{ font-size:12.5px; color:var(--label); }

  /* tooltip: bold title, a few rows, like a sports card (guide p35) */
  .maplibregl-popup-content{ padding:0; border:1px solid var(--hair); box-shadow:0 8px 26px rgba(35,40,43,.22);
                             font-family:"Helvetica Neue",Helvetica,Arial,sans-serif; }
  .maplibregl-popup-close-button{ font-size:18px; color:#fff; right:4px; top:2px; }
  .card{ width:228px; }
  .card .top{ background:var(--ink); color:#fff; padding:11px 13px; }
  .card .top .big{ font-size:17px; font-weight:800; }
  .card .top .tg{ font-size:11px; color:#c9cdc7; margin-top:2px; font-family:Verdana,sans-serif; }
  .card .mark{ display:inline-block; margin-top:8px; font-size:10px; font-weight:bold; text-transform:uppercase;
               letter-spacing:.04em; padding:3px 7px; }
  .card .mark.r{ background:var(--rust); color:#fff; }
  .card .mark.t{ background:#3a4145; color:#cfd3cd; }
  .card .body{ padding:8px 13px 12px; }
  .card .r{ display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #eee; font-size:12.5px; }
  .card .r:last-of-type{ border-bottom:0; }
  .card .r .k{ color:var(--label); }
  .card .r .v{ font-family:Verdana,sans-serif; }
  .card .shot-wrap{ margin-top:10px; }
  .card .shot{ width:100%; border-radius:8px; display:block; cursor:zoom-in; }
  .card .noimg{ background:var(--field); border:1px dashed var(--hair); border-radius:8px; padding:14px;
                text-align:center; font-size:12px; color:var(--label); }
  .card .noimg small{ display:block; margin-top:3px; font-size:10.5px; opacity:.8; }
  /* full-size photo overlay */
  #lightbox{ position:fixed; inset:0; z-index:80; background:rgba(20,28,28,.86); display:none;
             align-items:center; justify-content:center; flex-direction:column; gap:10px; cursor:zoom-out; padding:24px; }
  #lightbox.on{ display:flex; }
  #lightbox img{ max-width:90vw; max-height:80vh; border-radius:8px; box-shadow:0 16px 50px rgba(0,0,0,.5); }
  #lightbox .lb-cap{ color:#dfe4e0; font-size:13px; }
  .card .trip{ background:var(--field); margin:0 -13px 4px; padding:7px 13px; font-size:12px; color:#3f474b; }
  .card .trip b{ font-family:Verdana,sans-serif; color:var(--ink); }
  .card .legs{ margin:4px 0 2px; }
  .leg{ display:flex; justify-content:space-between; gap:8px; font-size:11.5px; padding:3px 0; border-bottom:1px dotted #e7e7e1; }
  .leg:last-child{ border-bottom:0; }
  .leg .when{ color:var(--label); }
  .leg .where{ text-align:right; }
  .leg .mi{ color:var(--rust-dk); }

  @media (max-width:680px){ .side{ display:none; } .legend{ display:none; } .pane{ width:calc(100% - 28px); } }
</style>
</head>

<body>

<!-- landing -->
<div id="gate">
  <div class="brandbar">
    <span class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.1 2 5 5 5 8.9 5 13.8 12 22 12 22s7-8.2 7-13.1C19 5 15.9 2 12 2z" fill="#6f8c78"/><circle cx="12" cy="9" r="2.7" fill="#fff"/></svg>
      FISHTAGGED
    </span>
    <nav class="navlinks">
      <a href="https://fishtagged.org/" target="_blank" rel="noopener">About</a>
      <a href="https://fishtagged.org/" target="_blank" rel="noopener">River Data</a>
      <a class="cta" href="https://fishtagged.org/" target="_blank" rel="noopener">Report a Catch</a>
    </nav>
  </div>
  <div class="col">
    <div class="hero">
      <h1>Search a tag. <i>Follow a fish.</i></h1>
      <p class="lead">Look up any tag from the Upper Potomac smallmouth program and trace
        where that fish has travelled between catches.</p>
      <div class="sub"><span>Upper Potomac River</span><span class="num">4,324 captures · 2020–2026</span></div>
    </div>

    <div class="levels">
      <button class="lvl" data-go="l1">
        <span class="n">1</span>
        <span><h3>Search a tag</h3><p>Type a tag number to see when it was tagged, how many times
          it came back, and the path from one catch to the next. Free for anyone.</p></span>
        <span class="who">open</span>
      </button>
      <button class="lvl" data-go="l2">
        <span class="n">2</span>
        <span><h3>Account — river conditions</h3><p>All species as generalised heatmaps. Remap the
          heat by water data — temperature, river level, turbidity, oxygen, flow.</p></span>
        <span class="who">account</span>
      </button>
      <button class="lvl" data-go="l3">
        <span class="n">3</span>
        <span><h3>Staff</h3><p>Full access — individual fish points and exact locations, all species,
          every field and toggle, plus the tile-feed status and a CSV export.</p></span>
        <span class="who">staff</span>
      </button>
    </div>
  </div>
</div>

<!-- app -->
<div id="app">
  <div id="map"></div>

  <div class="bar">
    <span class="name"><svg viewBox="0 0 24 24"><path d="M12 2C8.1 2 5 5 5 8.9 5 13.8 12 22 12 22s7-8.2 7-13.1C19 5 15.9 2 12 2z" fill="#6f8c78"/><circle cx="12" cy="9" r="2.7" fill="#fff"/></svg>FISHTAGGED</span>
    <span class="lvlname" id="lvlName"></span>
    <span class="fill"></span>
    <button class="flat" id="baseBtn">Satellite</button>
    <button class="flat" id="leaveBtn">Change level</button>
  </div>

  <div class="pane" id="pane"></div>

  <div class="side" id="side">
    <h3>Busiest spots</h3>
    <div class="ssub" id="sideSub">captures by location</div>
    <div id="bars"></div>
  </div>

  <div class="veil" id="veil"><div class="sp"></div><span>loading…</span></div>
</div>

<!-- full-size fish photo -->
<div id="lightbox" onclick="this.classList.remove('on')"><img alt=""><div class="lb-cap"></div></div>

<script>
const HERE = location.href.replace(/[^/]*$/,"");

// fish photos. each catch's FileName is the id; Fishtagged's own file proxy
// serves the image (same endpoint the original search-a-tag page used).
const PHOTO_PROXY = "https://fishtaggedfileproxy-840956266329.us-east4.run.app/retrieve?img_id=";
const photoURL = file => PHOTO_PROXY + encodeURIComponent(file);
function loadPhoto(wrap, file, tagNum){
  const img = new Image();
  img.className = "shot"; img.alt = "tag "+tagNum; img.loading = "lazy";
  img.onerror = ()=>{ wrap.innerHTML = '<div class="noimg">No photo on file<small>'+file+'</small></div>'; };
  img.onclick = ()=> openShot(img.src, file);
  img.src = photoURL(file);
  wrap.appendChild(img);
}
function openShot(url, file){
  const lb = document.getElementById("lightbox");
  lb.querySelector("img").src = url;
  lb.querySelector(".lb-cap").textContent = file || "";
  lb.classList.add("on");
}

const LIGHT = "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json";
const SAT = { version:8, sources:{ s:{ type:"raster", tileSize:256,
  tiles:["https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"],
  attribution:"Esri" }}, layers:[{ id:"s", type:"raster", source:"s" }] };

// the two data palettes — diverging for temperature, sequential for the rest
const RAMP = {
  tF:  { title:"Water temperature", unit:"°F", kind:"temp",
         stops:[40,"#2c6fb0", 52,"#83b9d6", 62,"#eeeedc", 70,"#e0a558", 78,"#c0402c"], scale:["40","60","78"] },
  lvl: { title:"River level", unit:"ft", kind:"seq",
         stops:[1,"#eef2ee", 2.5,"#a9c6ab", 4,"#5a9469", 7,"#2f6a45"], scale:["1","4","7+"] },
  turb:{ title:"Turbidity", unit:"FNU", kind:"seq",
         stops:[1,"#eef2ee", 8,"#a9c6ab", 20,"#5a9469", 40,"#2f6a45"], scale:["1","20","40+"] },
  do:  { title:"Dissolved oxygen", unit:"mg/L", kind:"seq",
         stops:[6,"#eef2ee", 8.5,"#a9c6ab", 11,"#5a9469", 13,"#2f6a45"], scale:["6","11","13+"] },
  cfs: { title:"Discharge", unit:"CFS", kind:"seq",
         stops:[1500,"#eef2ee", 6000,"#a9c6ab", 12000,"#5a9469", 20000,"#2f6a45"], scale:["1.5k","12k","20k"] },
};
function colorBy(field){
  const r = RAMP[field];
  const e = ["interpolate",["linear"],["to-number",["get",field],-999], -998,"#c4c8c2"];
  for(let i=0;i<r.stops.length;i+=2) e.push(r.stops[i], r.stops[i+1]);
  return e;
}

let map, META, TAGS=[], BYNUM={};
let role, base="light", view="points", hydro=null, species="All", retOnly=false;
let picked=null, fitted=false;
const empty = ()=>({type:"FeatureCollection",features:[]});

const LEVELS = { l1:"Level 1 · search a tag", l2:"Level 2 · account", l3:"Level 3 · staff" };

// load the index once (search, popups, stats, bar chart all read from it)
async function loadIndex(){
  if(META) return;
  const j = await (await fetch(HERE+"fish_index.json")).json();
  META = j.meta; TAGS = j.tags; BYNUM = j.byNum;
}

// a typed number can belong to more than one colour; take the one with the
// richest history (most recaptures, then most catches)
function findTag(n){
  const idx = BYNUM[n];
  if(!idx) return null;
  let best, score=-1;
  for(const i of idx){
    const t = TAGS[i];
    const rc = t.caps.filter(c=>c.rc==="Recaptured").length;
    const s = rc*1000 + t.caps.length;
    if(s>score){ score=s; best={t, rc, others:idx.length-1}; }
  }
  return best;
}

// --- map layers (re-added whenever the basemap style reloads) ---
function addLayers(){
  if(!map.getSource("fish")) map.addSource("fish",{
    type:"vector", tiles:[HERE+"tiles/{z}/{x}/{y}.pbf"],
    minzoom:META.minzoom, maxzoom:META.maxzoom, bounds:META.bounds });
  ["line","pts","ring"].forEach(s=>{ if(!map.getSource(s)) map.addSource(s,{type:"geojson",data:empty()}); });

  // heat exists for levels 2/3 only; level 1 never uses it
  map.addLayer({ id:"heat", type:"heatmap", source:"fish", "source-layer":"fish",
    layout:{visibility:"none"}, paint:{
      "heatmap-radius":["interpolate",["linear"],["zoom"],7,10,12,26],
      "heatmap-opacity":["interpolate",["linear"],["zoom"],7,.8,12,.6,14.5,0],
      "heatmap-color":["interpolate",["linear"],["heatmap-density"],
        0,"rgba(238,242,238,0)",.2,"#a9c6ab",.5,"#5a9469",.8,"#2f6a45",1,"#23463a"] }});

  map.addLayer({ id:"dots", type:"circle", source:"fish", "source-layer":"fish", paint:{
      "circle-radius":["interpolate",["linear"],["zoom"],8,3,12,5.5,16,9],
      "circle-color":"#5a9469",
      "circle-stroke-width":["case",["==",["get","rc"],"Recaptured"],2.2,.6],
      "circle-stroke-color":["case",["==",["get","rc"],"Recaptured"],"#b4622d","#fff"],
      "circle-opacity":.92 }});

  map.addLayer({ id:"jglow", type:"line", source:"line",
    paint:{"line-color":"#b4622d","line-width":8,"line-opacity":.16,"line-blur":3}});
  map.addLayer({ id:"jline", type:"line", source:"line", layout:{"line-cap":"round"},
    paint:{"line-color":"#b4622d","line-width":2.4,"line-dasharray":[1.5,1.2]}});
  map.addLayer({ id:"jdot", type:"circle", source:"pts",
    paint:{"circle-radius":["case",["==",["get","r"],"start"],6,5],
           "circle-color":["case",["==",["get","r"],"start"],"#5a6469","#b4622d"],
           "circle-stroke-width":2,"circle-stroke-color":"#fff"}});

  map.addLayer({ id:"halo", type:"circle", source:"ring",
    paint:{"circle-radius":17,"circle-color":"rgba(180,98,45,.10)","circle-stroke-color":"#b4622d","circle-stroke-width":1.6}});
  map.addLayer({ id:"hit", type:"circle", source:"ring",
    paint:{"circle-radius":6.5,"circle-color":"#b4622d","circle-stroke-color":"#fff","circle-stroke-width":2.2}});
}

function tileFilter(){
  const f=["all"];
  if(species!=="All") f.push(["==",["get","sp"],species]);
  if(retOnly) f.push(["==",["get","rc"],"Recaptured"]);
  return f.length>1 ? f : null;
}
function applyFilter(){
  ["dots","heat"].forEach(id=>{ if(map.getLayer(id)) map.setFilter(id, tileFilter()); });
}
function setView(v){
  view=v;
  // level 1 is a tag index — it never plots the whole population, only the tag
  // you look up. levels 2/3 toggle the points/density layers as normal.
  const heatOn = role!=="l1" && v==="heat";
  const dotsOn = role!=="l1" && v!=="heat";
  if(map.getLayer("heat")) map.setLayoutProperty("heat","visibility", heatOn?"visible":"none");
  if(map.getLayer("dots")) map.setLayoutProperty("dots","visibility", dotsOn?"visible":"none");
  if(heatOn && role!=="l2" && map.getLayer("heat")){    // L3 heatmap is always plain density
    map.setPaintProperty("heat","heatmap-weight",1);
    map.setPaintProperty("heat","heatmap-color",DENSITY_COLOR);
  }
  legend();
}
// level 2 keeps everything as a heatmap, so a water variable re-weights + recolours
// the heat instead of colouring points. level 3 colours the individual points.
const DENSITY_COLOR=["interpolate",["linear"],["heatmap-density"],
  0,"rgba(238,242,238,0)",.2,"#a9c6ab",.5,"#5a9469",.8,"#2f6a45",1,"#23463a"];
function heatColors(r){
  const cols=[]; for(let i=1;i<r.stops.length;i+=2) cols.push(r.stops[i]);
  const e=["interpolate",["linear"],["heatmap-density"],0,"rgba(255,255,255,0)"];
  cols.forEach((c,i)=> e.push(0.15 + 0.85*i/(cols.length-1), c));
  return e;
}
function paintHeat(){
  if(!map.getLayer("heat")) return;
  if(!hydro){
    map.setPaintProperty("heat","heatmap-weight",1);
    map.setPaintProperty("heat","heatmap-color",DENSITY_COLOR);
  }else{
    const r=RAMP[hydro], lo=r.stops[0], hi=r.stops[r.stops.length-2];
    map.setPaintProperty("heat","heatmap-weight",
      ["interpolate",["linear"],["to-number",["get",hydro],lo], lo,0.05, hi,1]);
    map.setPaintProperty("heat","heatmap-color",heatColors(r));
  }
}
function setHydro(h){
  hydro=h;
  if(role==="l2") paintHeat();
  else if(map.getLayer("dots")) map.setPaintProperty("dots","circle-color", h?colorBy(h):"#5a9469");
  legend();
}

function legend(){
  const box=byId("legend"); if(!box) return;
  const T=byId("legTitle"), S=byId("legSub"), R=byId("legRamp"), C=byId("legScale");
  R.style.display="";
  box.style.display="block";
  if(view==="heat"){
    if(role==="l2" && hydro){                      // heatmap remapped to a water variable
      const r=RAMP[hydro];
      T.textContent=r.title+" — heatmap";
      S.textContent="warmer colour = higher "+r.unit;
      R.className="ramp "+r.kind;
      C.innerHTML=r.scale.map(s=>"<span>"+s+"</span>").join("");
    }else{
      T.textContent="Catch density"; S.textContent="darker = more tags";
      R.className="ramp seq"; C.innerHTML="<span>fewer</span><span>more</span>";
    }
    return;
  }
  if(hydro){                                        // level 3, points coloured by a variable
    const r=RAMP[hydro];
    T.textContent=r.title; S.textContent="each dot is one catch · "+r.unit;
    R.className="ramp "+r.kind; C.innerHTML=r.scale.map(s=>"<span>"+s+"</span>").join("");
    return;
  }
  T.textContent="Tagged catches"; S.textContent="each dot is one catch";
  R.style.display="none"; C.innerHTML="";
}

// stats + the bar chart both read the index, filtered the same way as the map
function filteredCaps(){
  const out=[];
  for(const t of TAGS){
    if(species!=="All" && t.sp!==species) continue;
    for(const c of t.caps){
      if(retOnly && c.rc!=="Recaptured") continue;
      out.push(c);
    }
  }
  return out;
}
function stats(){
  const caps=filteredCaps();
  const temps=caps.map(c=>c.tF).filter(v=>v!=null && v>0);
  const rec=caps.filter(c=>c.rc==="Recaptured").length;
  set("nCount", caps.length.toLocaleString());
  set("nRecap", rec.toLocaleString());
  if(byId("nTemp")) set("nTemp", temps.length ? (temps.reduce((a,b)=>a+b,0)/temps.length).toFixed(1) : "—");
  if(byId("nMiles")){
    let tot=0, cnt=0;                       // average distance moved, over fish caught more than once
    for(const t of TAGS){
      if(species!=="All" && t.sp!==species) continue;
      if(t.caps.length<2) continue;
      tot+=pathMiles(t.caps); cnt++;
    }
    set("nMiles", cnt ? (tot/cnt).toFixed(1) : "—");
  }
  bars();
}
function bars(){
  const wrap=document.getElementById("bars"); if(!wrap) return;
  const count={};
  for(const c of filteredCaps()) if(c.spot) count[c.spot]=(count[c.spot]||0)+1;
  const top=Object.entries(count).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const max=top.length?top[0][1]:1;
  wrap.innerHTML = top.map(([nm,v])=>`
    <div class="b-row">
      <div class="bl"><span class="nm">${nm}</span><span class="vl">${v}</span></div>
      <div class="b-track"><div class="b-fill" style="width:${Math.round(v/max*100)}%"></div></div>
    </div>`).join("") || '<div class="ssub">no catches in this filter</div>';
  const sub = retOnly ? "recaptures by location" : (species!=="All" ? species.toLowerCase()+" by location" : "captures by location");
  set("sideSub", sub);
}

// --- search + journey ---
const fmt = s=>{ const d=new Date(s); return isNaN(d) ? s :
  d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+", "+
  d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}); };

function clearPick(){
  picked=null;
  ["line","pts","ring"].forEach(s=>map.getSource(s) && map.getSource(s).setData(empty()));
  if(pop) pop.remove();
}
function drawJourney(caps){
  const line=caps.map(c=>[c.lng,c.lat]);
  map.getSource("line").setData({type:"Feature",geometry:{type:"LineString",coordinates:line},properties:{}});
  map.getSource("pts").setData({type:"FeatureCollection",features:caps.map((c,i)=>({
    type:"Feature",properties:{r:i===0?"start":"again"},geometry:{type:"Point",coordinates:[c.lng,c.lat]}}))});
}
// distance a recaptured fish moved between catches (miles, great-circle)
function milesBetween(a,b){
  const R=3958.8, rad=x=>x*Math.PI/180;
  const dLat=rad(b[1]-a[1]), dLng=rad(b[0]-a[0]);
  const s=Math.sin(dLat/2)**2 + Math.cos(rad(a[1]))*Math.cos(rad(b[1]))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function pathMiles(caps){
  let m=0;
  for(let i=1;i<caps.length;i++) m+=milesBetween([caps[i-1].lng,caps[i-1].lat],[caps[i].lng,caps[i].lat]);
  return m;
}
function daysOut(caps){
  const a=new Date(caps[0].dt), b=new Date(caps[caps.length-1].dt);
  return (isNaN(a)||isNaN(b)) ? null : Math.round((b-a)/86400000);
}

function search(n, fly){
  n=(n||"").replace(/\D/g,"");
  if(!n){ say("Type a tag number first.","bad"); return; }
  const hit=findTag(n);
  if(!hit){ say("Tag "+n+" isn't in the data.","bad"); clearPick(); return; }
  const caps=hit.t.caps, last=caps[caps.length-1];
  picked=n;
  map.getSource("ring").setData({type:"Feature",geometry:{type:"Point",coordinates:[last.lng,last.lat]},properties:{}});
  if(caps.length>1){
    drawJourney(caps);
    if(fly){
      const xs=caps.map(c=>c.lng), ys=caps.map(c=>c.lat);
      map.fitBounds([[Math.min(...xs),Math.min(...ys)],[Math.max(...xs),Math.max(...ys)]],
        {padding:150,maxZoom:13,duration:800});
    }
  } else {
    map.getSource("line").setData(empty()); map.getSource("pts").setData(empty());
    if(fly) map.flyTo({center:[last.lng,last.lat],zoom:13,speed:.9});
  }
  const more = hit.others ? "  (+"+hit.others+" more on this number)" : "";
  if(caps.length>1){
    const mi=pathMiles(caps).toFixed(1), d=daysOut(caps);
    say(`Tag ${n} — caught ${caps.length} times, ${hit.rc} recapture${hit.rc===1?"":"s"}. Moved ${mi} mi`+
        (d!=null?` over ${d} days.`:".")+more,"good");
  } else {
    say(`Tag ${n} — tagged, no recaptures yet.`+more,"good");
  }
  card(hit.t, hit.rc, [last.lng,last.lat]);
}

const shortDate = s=>{ const d=new Date(s); return isNaN(d)?s:
  d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"}); };

let pop=null;
function card(t, rc, at){
  if(pop) pop.remove();
  const caps=t.caps, first=caps[0], last=caps[caps.length-1];
  const head = role==="l1" ? "Tag "+t.num : "Tag "+t.num+" · "+t.color+" "+(t.alpha||"");
  const rowsHydro = role==="l1" ? "" :
    [["Water temp",last.tF,"°F"],["River level",last.lvl,"ft"],["Turbidity",last.turb,"FNU"],
     ["Oxygen",last.do,"mg/L"],["Flow",last.cfs,"CFS"]]
    .map(([k,v,u])=> (v==null||v<0)?"":`<div class="r"><span class="k">${k}</span><span class="v">${v} ${u}</span></div>`).join("");
  const pic = first.file ? `<div class="shot-wrap" id="cardShot"></div>` : "";

  let body;
  if(caps.length>1){
    // the headline for a retagged fish: how far it moved and the catch-by-catch path
    const mi=pathMiles(caps).toFixed(1), d=daysOut(caps);
    const legs = caps.map((c,i)=>{
      const lab = i===0 ? "Tagged" : "Recap";
      const leg = i===0 ? "" :
        `<span class="mi">+${milesBetween([caps[i-1].lng,caps[i-1].lat],[c.lng,c.lat]).toFixed(1)} mi</span>`;
      return `<div class="leg"><span class="when">${lab} · ${shortDate(c.dt)}</span>
                <span class="where">${c.spot||"—"} ${leg}</span></div>`;
    }).join("");
    body = `
      <div class="trip">Moved <b>${mi} mi</b>${d!=null?` over <b>${d}</b> days`:""}</div>
      <div class="legs">${legs}</div>
      ${rowsHydro}${pic}`;
  } else {
    const len = (first.in||first.mm) ? `<div class="r"><span class="k">Length</span><span class="v">${first.in?first.in+'"':""}${first.mm?" · "+first.mm+" mm":""}</span></div>` : "";
    body = `
      <div class="r"><span class="k">Tagged</span><span class="v">${fmt(first.dt)}</span></div>
      <div class="r"><span class="k">Spot</span><span class="v">${first.spot||"—"}</span></div>
      ${len}${rowsHydro}${pic}`;
  }

  pop = new maplibregl.Popup({offset:13,maxWidth:"250px"}).setLngLat(at).setHTML(`
    <div class="card">
      <div class="top">
        <div class="big">${t.sp}</div>
        <div class="tg">${head}</div>
        <div class="mark ${rc?"r":"t"}">${rc?rc+" recapture"+(rc>1?"s":""):"tagged"}</div>
      </div>
      <div class="body">${body}</div>
    </div>`).addTo(map);

  if(first.file){
    const w = document.getElementById("cardShot");   // popup is in the DOM after addTo
    if(w) loadPhoto(w, first.file, t.num);
  }
}

function say(t,kind){ const e=document.getElementById("said"); if(!e) return;
  e.textContent=t; e.className="said on "+kind; }

// --- panel per level (controls stay plain — no colour, per Mr. Bailey) ---
function panel(){
  const seek = `<div class="blk">
      <div class="cap">Find a tag</div>
      <div class="seek" style="margin-top:8px">
        <input id="seek" inputmode="numeric" maxlength="6" placeholder="tag number">
        <button id="seekGo">Find</button>
      </div>
      <div class="tries">try <a data-n="304">304</a>, <a data-n="841">841</a>, <a data-n="97">97</a>, <a data-n="1974">1974</a></div>
      <div class="said" id="said"></div>
    </div>`;

  const viewSeg = `<div class="blk">
      <div class="cap">Map</div>
      <div class="seg" id="viewSeg" style="margin-top:8px">
        <button data-v="points" class="${view!=="heat"?"on":""}">Points</button>
        <button data-v="heat" class="${view==="heat"?"on":""}">Heatmap</button>
      </div></div>`;

  const speciesChips = `<div class="blk"><div class="cap">Species</div>
      <div class="pick" id="spp" style="margin-top:8px">
        ${["All","Smallmouth","Walleye","Largemouth","Channel Cat","Muskellunge"]
          .map(s=>`<span data-s="${s}" class="${species===s?"on":""}">${s}</span>`).join("")}
      </div></div>`;

  const numbers = `<div class="blk">
      <div class="cap" id="numsCap">In view</div>
      <div class="nums" style="margin-top:9px">
        <div class="one"><div class="v num" id="nCount">—</div><div class="k">catches</div></div>
        <div class="one"><div class="v num" id="nRecap">—</div><div class="k">recaptures</div></div>
        ${role==="l1"?"":'<div class="one"><div class="v num" id="nTemp">—</div><div class="k">avg °F</div></div>'+
                         '<div class="one"><div class="v num" id="nMiles">—</div><div class="k">avg mi moved</div></div>'}
      </div></div>`;

  const legendBlk = `<div class="blk">
      <div class="cap">Legend</div>
      <div class="legend" id="legend" style="margin-top:8px">
        <div class="lt" id="legTitle"></div>
        <div class="ls" id="legSub"></div>
        <div class="ramp seq" id="legRamp"></div>
        <div class="scale" id="legScale"></div>
        <div class="ret"><span class="dot-ret"></span> rust ring / line = a fish caught again</div>
      </div></div>`;

  if(role==="l1"){
    // a tag index — no population layer; search shows one fish, the chart gives the overview
    return seek + numbers + legendBlk + `<div class="blk">
        <div class="ingest">Search a tag to trace one fish and how far it travelled.
        No map of every fish here — the busiest-spots chart on the right is the overview.</div></div>`;
  }

  const hydroRows = [['tF','Water temperature','°F'],['lvl','River level','ft'],
    ['turb','Turbidity','FNU'],['do','Dissolved oxygen','mg/L'],['cfs','Discharge','CFS']];
  const hydroMenu = `<div class="blk">
      <div class="cap">${role==="l2"?"Heatmap shows":"Colour the points by"}</div>
      <div class="rows" id="hydro" style="margin-top:8px">
        <button data-h="" class="on">${role==="l2"?"Catch density":"None"}</button>
        ${hydroRows.map(([h,t,u])=>`<button data-h="${h}">${t}<span class="tagm">${u}</span></button>`).join("")}
        <button class="off">Weather<span class="tagm">soon</span></button>
        <button class="off">Moon &amp; tide<span class="tagm">soon</span></button>
      </div></div>`;

  const recap = `<div class="blk">
      <div class="cap">Show</div>
      <div class="seg" id="retSeg" style="margin-top:8px">
        <button data-r="all" class="on">All</button>
        <button data-r="ret">Recaptured</button>
      </div></div>`;

  if(role==="l2"){
    // account view: heatmaps only, no exact points. each water variable is its own heatmap.
    return seek + speciesChips + hydroMenu + recap + numbers + legendBlk + `<div class="blk">
        <div class="ingest">Level 2 stays on generalised <b>heatmaps</b> — pick a water variable to
        remap the heat. Searching a tag still traces its path. Exact fish locations are Level 3.</div></div>`;
  }

  // l3 — full access: individual points + exact locations + everything on
  const feed = `<div class="blk">
      <div class="cap">Tile feed</div>
      <div class="ingest" style="margin-top:8px">
        source <code>tiles/{z}/{x}/{y}.pbf</code><br>
        <b>● live</b> · <span id="featN"></span> catches · layer <code>fish</code><br>
        later → <code>mapbox://&lt;id&gt;</code>
      </div>
      <button class="flat" id="csv" style="width:100%;margin-top:9px">Export this view (CSV)</button></div>`;
  return seek + viewSeg + speciesChips + hydroMenu + recap + numbers + feed + legendBlk;
}

function defaults(){
  if(role==="l1"){ view="points"; hydro=null; species="All"; retOnly=false; }
  if(role==="l2"){ view="heat";   hydro=null; species="All"; retOnly=false; }
  if(role==="l3"){ view="points"; hydro=null; species="All"; retOnly=false; }
}
function wire(){
  const g=document.getElementById("seekGo");
  if(g) g.onclick=()=>search(val("seek"),true);
  const s=document.getElementById("seek");
  if(s) s.addEventListener("keydown",e=>{ if(e.key==="Enter") search(s.value,true); });
  document.querySelectorAll(".tries a").forEach(a=>a.onclick=()=>{ s.value=a.dataset.n; search(a.dataset.n,true); });

  bindSeg("viewSeg","v", v=>setView(v));
  bindSeg("retSeg","r", v=>{ retOnly=(v==="ret"); applyFilter(); stats(); });

  const h=document.getElementById("hydro");
  if(h) h.addEventListener("click",e=>{ const b=e.target.closest("button"); if(!b||b.classList.contains("off")) return;
    setHydro(b.dataset.h||null);
    // level 3 colours individual points, so a hydro pick flips it to the points view.
    // level 2 stays on the heatmap (setHydro remaps the heat instead).
    if(role!=="l2" && hydro && view!=="points"){ setView("points"); flag("viewSeg","v","points"); }
    h.querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b)); });

  const sp=document.getElementById("spp");
  if(sp) sp.addEventListener("click",e=>{ const x=e.target.closest("span"); if(!x) return;
    sp.querySelectorAll("span").forEach(y=>y.classList.remove("on")); x.classList.add("on");
    species=x.dataset.s; applyFilter(); stats(); });

  if(byId("featN")) set("featN", META.count.toLocaleString());
  if(byId("csv")) document.getElementById("csv").onclick=exportCSV;
}
function bindSeg(id,attr,fn){
  const el=document.getElementById(id); if(!el) return;
  el.addEventListener("click",e=>{ const b=e.target.closest("button"); if(!b) return;
    el.querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b)); fn(b.dataset[attr]); });
}
function flag(id,attr,v){ const el=document.getElementById(id); if(!el) return;
  el.querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset[attr]===v)); }

function onStyle(){
  addLayers(); applyFilter(); setView(view); setHydro(hydro); stats();
  if(picked) search(picked,false);
  if(!fitted){ map.fitBounds([[META.bounds[0],META.bounds[1]],[META.bounds[2],META.bounds[3]]],
    {padding:{top:70,left:350,right:280,bottom:60},duration:0}); fitted=true; }
  document.getElementById("veil").classList.add("off");
}

async function enter(r){
  role=r; defaults();
  document.getElementById("lvlName").textContent=LEVELS[r];
  document.getElementById("gate").style.display="none";
  document.getElementById("app").classList.add("on");
  document.getElementById("side").style.display = "block";

  try{ await loadIndex(); }
  catch(e){ document.getElementById("veil").innerHTML=
    '<span style="max-width:320px;text-align:center;line-height:1.5">Serve this folder over http (see DEPLOY.md) — the tiles and index can\'t load from a file:// page.</span>';
    return; }

  document.getElementById("pane").innerHTML=panel();
  wire();

  if(!map){
    map=new maplibregl.Map({container:"map",style:LIGHT,center:[-77.6,39.35],zoom:9});
    map.addControl(new maplibregl.NavigationControl({showCompass:false}),"bottom-right");
    map.on("style.load",onStyle);
    map.on("idle", hideVeil);          // once the map has actually drawn, drop the loader
    map.on("click","dots",e=> search(String(e.features[0].properties.tag), false));  // draws the journey + miles too
    map.on("mouseenter","dots",()=>map.getCanvas().style.cursor="pointer");
    map.on("mouseleave","dots",()=>map.getCanvas().style.cursor="");
  } else if(map.isStyleLoaded()){
    clearPick(); applyFilter(); setView(view); setHydro(hydro); stats();
    hideVeil();
  }
  setTimeout(hideVeil, 3000);          // safety net so the spinner never gets stuck

  // guide tip: show up with something already selected so people see it's interactive.
  // level 1 lands on the full river, then quietly draws tag 304's path on top.
  if(r==="l1") setTimeout(()=>{ if(role==="l1"){ val("seek","841"); search("841",true); } }, 400);
}

function exportCSV(){
  const head=["num","color","alpha","sp","rc","dt","spot","lng","lat","tF","lvl","turb","do","cfs"];
  const lines=[head.join(",")];
  for(const t of TAGS){
    if(species!=="All" && t.sp!==species) continue;
    for(const c of t.caps){
      if(retOnly && c.rc!=="Recaptured") continue;
      const row=[t.num,t.color,t.alpha,t.sp,c.rc,c.dt,c.spot,c.lng,c.lat,c.tF,c.lvl,c.turb,c.do,c.cfs]
        .map(v=>{ v=v==null?"":(""+v); return /[",]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; });
      lines.push(row.join(","));
    }
  }
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([lines.join("\n")],{type:"text/csv"}));
  a.download="fishtagged_"+(species==="All"?"all":species.toLowerCase().replace(/ /g,""))+(retOnly?"_recaptured":"")+".csv";
  a.click(); URL.revokeObjectURL(a.href);
}

// pick a level and go straight in — no login for now
document.querySelectorAll(".lvl").forEach(b=>b.onclick=()=> enter(b.dataset.go));

document.getElementById("leaveBtn").onclick=()=>{
  document.getElementById("app").classList.remove("on");
  document.getElementById("gate").style.display="block";
  clearPick();
};
document.getElementById("baseBtn").onclick=()=>{
  base = base==="light" ? "sat" : "light";
  document.getElementById("baseBtn").textContent = base==="light" ? "Satellite" : "Plain";
  document.getElementById("veil").classList.remove("off");
  map.setStyle(base==="light"?LIGHT:SAT);
};

// little dom helpers
function hideVeil(){ const v=document.getElementById("veil"); if(v) v.classList.add("off"); }
function byId(id){ return document.getElementById(id); }
function set(id,v){ const e=byId(id); if(e) e.textContent=v; }
function val(id,v){ const e=byId(id); if(v!=null) e.value=v; return e?e.value:""; }
</script>
